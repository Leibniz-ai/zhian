<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>安保AI智能预警平台</title>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #030816; overflow: hidden; }
      #app-loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #030816; z-index: 9999;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        transition: opacity 0.5s;
      }
      .loader {
        width: 60px; height: 60px;
        border: 4px solid rgba(0, 229, 255, 0.2);
        border-top-color: #00e5ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
      }
      .loading-text {
        margin-top: 20px;
        color: #00e5ff;
        font-family: sans-serif;
        font-size: 14px;
        letter-spacing: 4px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes spin { 100% { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; text-shadow: 0 0 10px #00e5ff; } }
    </style>
    <script type="module" crossorigin src="/anbaoai-mvp/assets/index-BTp2BgVh.js"></script>
    <link rel="stylesheet" crossorigin href="/anbaoai-mvp/assets/index-CjwQSv5y.css">
  </head>
  <body>
    <div id="app-loading">
      <div class="loader"></div>
      <div class="loading-text">SYSTEM INITIALIZING...</div>
    </div>
    <div id="app"></div>
    <script>
      window.onload = () => {
        const loader = document.getElementById('app-loading');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
      }
    </script>
  </body>
</html>
